<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Beautiful violet gradient background matching the theme exactly -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="60%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    
    <!-- Drop shadow for the shield -->
    <filter id="shieldShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Rounded rectangle background (120px corner radius for smooth premium look) -->
  <rect width="512" height="512" rx="120" fill="url(#bgGrad)" />

  <!-- Shield and Sprout group, centered and scaled to 512px canvas -->
  <g transform="scale(18.5) translate(2.8, 2.8)" filter="url(#shieldShadow)">
    <!-- Shield body -->
    <path d="M11 2L3 5.5V11C3 15.4 6.4 19.5 11 21C15.6 19.5 19 15.4 19 11V5.5L11 2Z" fill="white" fill-opacity="0.25"/>
    <path d="M11 2L3 5.5V11C3 15.4 6.4 19.5 11 21C15.6 19.5 19 15.4 19 11V5.5L11 2Z" stroke="white" stroke-width="1.2" stroke-linejoin="round"/>
    
    <!-- Sprout stem -->
    <line x1="11" y1="15" x2="11" y2="10" stroke="#fbbf24" stroke-width="1.4" stroke-linecap="round"/>
    
    <!-- Left leaf -->
    <path d="M11 12.5C11 12.5 9 11.5 8.5 10C9.5 10 11 11 11 12.5Z" fill="#6ee7b7"/>
    
    <!-- Right leaf -->
    <path d="M11 12.5C11 12.5 13 11.5 13.5 10C12.5 10 11 11 11 12.5Z" fill="#34d399"/>
    
    <!-- Top bud -->
    <circle cx="11" cy="9.5" r="1.2" fill="#fbbf24"/>
    
    <!-- Star sparkle top-right -->
    <path d="M16.5 5L16.8 6L17.8 6L17 6.6L17.3 7.6L16.5 7L15.7 7.6L16 6.6L15.2 6L16.2 6L16.5 5Z" fill="#fde68a" fill-opacity="0.9"/>
  </g>
</svg>
